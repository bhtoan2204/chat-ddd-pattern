syntax = "proto3";

package ledger.v1;

option go_package = "wechat-clone/core/shared/transport/grpc/gen/ledger/v1;ledgerv1";

service LedgerPaymentService {
  rpc ApplyPaymentEvent(ApplyPaymentEventRequest) returns (ApplyPaymentEventResponse);
}

message ApplyPaymentEventRequest {
  string event_name = 1;
  string event_data_json = 2;
}

message ApplyPaymentEventResponse {
  bool applied = 1;
}
