version: 1
basePath: /api/v1

endpoints:
  - name: WorkflowCreateStripeTopUp
    method: POST
    path: /payment/intents
    handler: CreateStripeTopUpHandler
    auth: true
    successStatus: 201
    usecase:
      name: WorkflowUsecase
      method: CreateStripeTopUp
    request:
      struct: CreateStripeTopUpRequest
      fields:
        - name: amount
          type: int64
          required: true
        - name: currency
          type: string
          required: true
        - name: metadata
          type: object
    response:
      struct: StripeTopUpResponse
      fields:
        - name: provider
          type: string
        - name: workflow
          type: string
        - name: transaction_id
          type: string
        - name: external_ref
          type: string
        - name: amount
          type: int64
        - name: fee_amount
          type: int64
        - name: provider_amount
          type: int64
        - name: status
          type: string
        - name: checkout_url
          type: string

  - name: WorkflowProcessStripeWebhook
    method: POST
    path: /payment/webhooks/stripe
    handler: ProcessStripeWebhookHandler
    usecase:
      name: WorkflowUsecase
      method: ProcessStripeWebhook
    request:
      struct: ProcessStripeWebhookRequest
      fields:
        - name: signature
          type: string
          source: header
          header: Stripe-Signature
        - name: payload
          type: string
          source: raw_body
    response:
      struct: StripeWebhookResponse
      fields:
        - name: provider
          type: string
        - name: transaction_id
          type: string
        - name: external_ref
          type: string
        - name: status
          type: string
        - name: duplicate
          type: bool
        - name: ledger_posted
          type: bool
