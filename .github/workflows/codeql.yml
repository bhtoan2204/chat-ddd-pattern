name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"
          cache: true

      - run: go mod download

      - uses: github/codeql-action/init@v3
        with:
          languages: go

      - run: go build ./...

      - uses: github/codeql-action/analyze@v3
