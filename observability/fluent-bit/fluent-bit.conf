[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224

[FILTER]
    Name          parser
    Match         app
    Key_Name      log
    Parser        json
    Reserve_Data  On
    Preserve_Key  On

[FILTER]
    Name          parser
    Match         gateway
    Key_Name      log
    Parser        json
    Reserve_Data  On
    Preserve_Key  On

[FILTER]
    Name          modify
    Match         app
    Add           service_name wechat-clone

[FILTER]
    Name          modify
    Match         gateway
    Add           service_name gateway

[OUTPUT]
    Name               es
    Match              app
    Host               chat-elasticsearch
    Port               9200
    Index              app-logs-wechat-clone
    Logstash_Format    On
    Logstash_Prefix    app-logs-wechat-clone
    Suppress_Type_Name On
    Generate_ID        On
    Replace_Dots       On

[OUTPUT]
    Name               es
    Match              gateway
    Host               chat-elasticsearch
    Port               9200
    Index              app-logs-gateway
    Logstash_Format    On
    Logstash_Prefix    app-logs-gateway
    Suppress_Type_Name On
    Generate_ID        On
    Replace_Dots       On
